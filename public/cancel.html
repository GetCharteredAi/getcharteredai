<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Cancelled — Get Chartered AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:20px;padding:48px 40px;max-width:440px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.08);text-align:center;border:1px solid #e2e8f0}
.icon{font-size:48px;margin-bottom:20px}
h1{font-size:24px;font-weight:700;color:#0f172a;margin-bottom:10px;letter-spacing:-.02em}
p{font-size:15px;color:#64748b;line-height:1.65;margin-bottom:28px}
.btn{display:inline-block;padding:13px 28px;background:#2563EB;color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;border-radius:8px;text-decoration:none;transition:.18s;margin:6px}
.btn:hover{background:#1d4ed8}
.btn-ghost{background:transparent;color:#64748b;border:1.5px solid #e2e8f0}
.btn-ghost:hover{border-color:#2563EB;color:#2563EB}
</style>
</head>
<body>
<div class="card">
  <div class="icon">↩</div>
  <h1>Payment Cancelled</h1>
  <p>No problem — your card has not been charged. You can enrol whenever you're ready.</p>
  <a href="/index.html#pricing-sec" class="btn">Back to Pricing</a>
  <a href="/index.html" class="btn btn-ghost">Go to Homepage</a>
</div>
</body>
</html>
